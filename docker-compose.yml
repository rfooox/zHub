version: '3.8'

services:
  zhub:
    build: .
    container_name: zhub
    ports:
      - "5000:5000"
      - "8500:8500"
    environment:
      - CONSUL_ENABLED=true
      - CONSUL_HOST=127.0.0.1
      - CONSUL_PORT=8500
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
      - HEALTH_CHECK_ENABLED=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped
